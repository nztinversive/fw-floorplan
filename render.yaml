services:
  - type: web
    name: fw-floorplan
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_CONVEX_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_IMAGE_MODEL
        value: gpt-image-2
      - key: OPENAI_RENDER_CRITIQUE_MODEL
        value: gpt-5.4-mini
